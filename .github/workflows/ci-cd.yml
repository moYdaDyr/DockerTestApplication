name: PVS Test CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    permissions:
      packages: write
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and start containers
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: |
          sleep 10
          docker compose ps

      - name: Install Newman (Postman CLI)
        run: npm install -g newman

      - name: Run integration tests
        run: |
          newman run postman_tests.json \
            --reporters cli,json --reporter-json-export test-results.json

      - name: Stop containers
        if: always()
        run: docker compose down

      - name: Check out the repo
        uses: actions/checkout@v5

      - name: Log in to Docker Hub
        uses: docker/login-action@f4ef78c080cd8ba55a85445d5b36e214a81df20a
        with:
          username: ${{ secrets.NAMEDOCKER }}
          password: ${{ secrets.PASSWORDDOCKER }}

      - name: Extract metadata for frontend Docker
        id: meta1
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: moydadyr/docker-test-frontend-repository

      - name: Extract metadata for backend Docker
        id: meta2
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: moydadyr/docker-test-backend-repository

      - name: Build and push Docker image (frontend)
        id: push1
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: TestApplictionBackend/Dockerfile
          push: true
          tags: ${{ steps.meta1.outputs.tags }}
          labels: ${{ steps.meta1.outputs.labels }}

      - name: Build and push Docker image (frontend)
        id: push2
        uses: docker/build-push-action@3b5e8027fcad23fda98b2e3ac259d8d67585f671
        with:
          context: .
          file: testapplicationfrontend/Dockerfile
          push: true
          tags: ${{ steps.meta2.outputs.tags }}
          labels: ${{ steps.meta2.outputs.labels }}
