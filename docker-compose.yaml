# docker compose up --build

services:

        
   postgres:
    image: postgres:14.5-alpine
    container_name: database_container
    environment:
      POSTGRES_DB: ${DB_NAME:-TestWebApplicationBase}
      POSTGRES_HOST: ${DB_HOST:-localhost}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      PGDATA: "/var/lib/postgresql/data/pgdata"
    expose: 
      - 5432
    ports: 
      - 5432:5432
    healthcheck: 
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes: 
       - postgres_data:/var/lib/postgresql/data
         
   backend: 
    build: 
      context: .
      dockerfile: TestApplictionBackend/Dockerfile
      target: final
    container_name: backend_container
    ports: 
      - 5000:5000
    depends_on: 
      postgres:
        condition: service_healthy
        
   frontend: 
     build: 
       context: .
       dockerfile: testapplicationfrontend/Dockerfile
     container_name: frontend_container
     ports: 
      - 8080:80
     depends_on: 
       - backend
 
volumes:
  postgres_data:

secrets: 
  db-password: 
    file: dbpassword.txt

